name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      release_sha: ${{ steps.release-ref.outputs.sha }}
      release_manifest: ${{ steps.release-ref.outputs.release_manifest }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.RELEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Resolve immutable release SHA
        id: release-ref
        if: steps.release.outputs.releases_created == 'true'
        env:
          RELEASE_OUTPUTS: ${{ toJSON(steps.release.outputs) }}
          RELEASE_PATHS: ${{ steps.release.outputs.paths_released }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const outputs = JSON.parse(process.env.RELEASE_OUTPUTS || '{}');
          const paths = JSON.parse(process.env.RELEASE_PATHS || '[]');
          if (!Array.isArray(paths) || paths.length === 0) {
            throw new Error('release-please reported a release without paths');
          }

          const shas = paths.map((path) => outputs[`${path}--sha`]);
          if (shas.some((sha) => typeof sha !== 'string' || !/^[0-9a-f]{40,64}$/.test(sha))) {
            throw new Error(`Missing immutable release SHA for paths: ${paths.join(', ')}`);
          }

          const uniqueShas = [...new Set(shas)];
          if (uniqueShas.length !== 1) {
            throw new Error(`Release paths point at different SHAs: ${uniqueShas.join(', ')}`);
          }

          const releaseManifest = paths.map((path) => {
            const tag = outputs[`${path}--tag_name`];
            if (typeof tag !== 'string' || !/^[A-Za-z0-9._-]+$/.test(tag)) {
              throw new Error(`Missing or invalid release tag for ${path}: ${String(tag)}`);
            }
            return { path, tag };
          });

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `sha=${uniqueShas[0]}\n`);
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `release_manifest=${JSON.stringify(releaseManifest)}\n`,
          );
          NODE

  trigger-publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true' && needs.release-please.outputs.release_sha != '' && needs.release-please.outputs.release_manifest != ''
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CI publish via workflow_dispatch
        uses: actions/github-script@v9
        env:
          RELEASE_SHA: ${{ needs.release-please.outputs.release_sha }}
          RELEASE_MANIFEST: ${{ needs.release-please.outputs.release_manifest }}
        with:
          script: |
            const releaseSha = process.env.RELEASE_SHA;
            const releaseManifest = process.env.RELEASE_MANIFEST;

            if (!/^[0-9a-f]{40,64}$/.test(releaseSha)) {
              core.setFailed(`Invalid immutable release SHA: ${releaseSha}`);
              return;
            }

            const releases = JSON.parse(releaseManifest);
            if (!Array.isArray(releases) || releases.length === 0) {
              core.setFailed('release-please returned no release manifest');
              return;
            }

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              ref: 'main',
              inputs: {
                release_sha: releaseSha,
                release_manifest: releaseManifest,
                publish: 'true',
              },
            });
            console.log(`✅ Triggered ci.yml publish for ${releaseSha}`);
