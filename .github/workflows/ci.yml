name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test packages/

      - name: Type check (core)
        run: bunx tsc --noEmit -p packages/core/tsconfig.json
        continue-on-error: true


  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx @playwright/test install --with-deps chromium

      - name: Run E2E tests
        run: bunx @playwright/test test
        continue-on-error: true

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Publish all packages
        run: |
          set -e
          PUBLISH_FAILED=0
          
          # Since this runs on tags (or dispatch), and release-please bumps versions for modified packages,
          # we can just attempt to publish all packages. If a package version matches what's on npm,
          # we skip it.
          for pkg_dir in packages/*/; do
            PKG_JSON="$pkg_dir/package.json"
            if [ -f "$PKG_JSON" ]; then
              NAME=$(node -p "require('./$PKG_JSON').name")
              LOCAL_VER=$(node -p "require('./$PKG_JSON').version")
              NPM_EXISTS=$(npm view "$NAME@$LOCAL_VER" version 2>/dev/null || echo "")
              
              if [ -z "$NPM_EXISTS" ]; then
                echo "🚀 Publishing $NAME@$LOCAL_VER..."
                if ! (cd "$pkg_dir" && npm publish --provenance --access public); then
                  echo "❌ Publish FAILED for $NAME"
                  PUBLISH_FAILED=1
                fi
              else
                echo "⏭️ $NAME@$LOCAL_VER already on npm, skipping"
              fi
            fi
          done

          if [ "$PUBLISH_FAILED" -eq 1 ]; then
            echo "::error::One or more packages failed to publish"
            exit 1
          fi
