name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_sha:
        description: Immutable commit SHA created by release-please
        required: false
        type: string
        default: ""
      release_manifest:
        description: JSON array of release-please package paths and tags
        required: false
        type: string
        default: "[]"
      publish:
        description: Publish the release-please packages after all gates pass
        required: false
        type: boolean
        default: false

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_sha || github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build workspace packages
        run: bun run build:packages

      - name: Run tests
        run: bun run test

      - name: Build example application
        run: bun run --cwd example build

      - name: Verify example bundle budgets
        run: bun run bundle:check

      - name: Build documentation site
        run: bun run docs:build

      - name: Type check
        run: bun run typecheck

      - name: Verify npm tarballs and consumer imports
        run: bun run pack:check

      - name: Audit dependencies
        run: bun run audit

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || inputs.publish

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_sha || github.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace packages
        run: bun run build:packages

      - name: Install Playwright browsers
        run: bun run playwright install --with-deps chromium

      - name: Run E2E tests
        run: bun run playwright test
        # continue-on-error: true  -- removed: E2E must gate PRs

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.event_name == 'workflow_dispatch' && inputs.publish && inputs.release_sha != '' && needs.test.result == 'success' && needs.e2e.result == 'success'
    concurrency:
      group: npm-publish-${{ inputs.release_sha }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          fetch-tags: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Verify release tags
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          RELEASE_MANIFEST: ${{ inputs.release_manifest }}
        run: bun scripts/verify-release-manifest.ts

      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build publishable packages
        run: bun run build:packages

      - name: Prepare publish manifests
        run: |
          set -e
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const pkgs = fs.readdirSync('packages').filter(p => fs.statSync(path.join('packages', p)).isDirectory());
          const versions = {};
          for (const p of pkgs) {
            const pjson = path.join('packages', p, 'package.json');
            if (fs.existsSync(pjson)) {
              const data = JSON.parse(fs.readFileSync(pjson, 'utf8'));
              versions[data.name] = data.version;
            }
          }
          for (const p of pkgs) {
            const pjson = path.join('packages', p, 'package.json');
            if (!fs.existsSync(pjson)) continue;
            const raw = fs.readFileSync(pjson, 'utf8');
            const pkg = JSON.parse(raw);
            let changed = false;
            for (const t of ['dependencies', 'devDependencies', 'peerDependencies']) {
              if (pkg[t]) {
                for (const k in pkg[t]) {
                  if (pkg[t][k] === 'workspace:*' && versions[k]) {
                    pkg[t][k] = '^' + versions[k];
                    changed = true;
                  }
                }
              }
            }
            if (changed) {
              fs.writeFileSync(pjson, JSON.stringify(pkg, null, 2) + '\n');
              console.log('  Rewrote workspace:* in ' + pjson);
            }
          }
          NODE

      - name: Verify publish tarballs and consumer imports
        run: bun run pack:check

      - name: Publish released packages
        env:
          RELEASE_MANIFEST: ${{ inputs.release_manifest }}
        run: |
          set -e
          PUBLISH_FAILED=0
          RELEASE_DIRS=$(node <<'NODE'
          const releases = JSON.parse(process.env.RELEASE_MANIFEST || '[]');
          if (!Array.isArray(releases) || releases.length === 0) {
            throw new Error('release-please returned no release manifest');
          }
          for (const release of releases) {
            const packagePath = release?.path;
            if (typeof packagePath !== 'string' || !/^packages\/[^/]+$/.test(packagePath)) {
              throw new Error(`Invalid release package path: ${String(packagePath)}`);
            }
            console.log(`${packagePath}/`);
          }
          NODE
          )

          while IFS= read -r pkg_dir; do
            PKG_JSON="$pkg_dir/package.json"
            if [ -f "$PKG_JSON" ]; then
              NAME=$(node -p "require('./$PKG_JSON').name")
              LOCAL_VER=$(node -p "require('./$PKG_JSON').version")
              NPM_EXISTS=$(npm view "$NAME@$LOCAL_VER" version 2>/dev/null || echo "")

              if [ -z "$NPM_EXISTS" ]; then
                echo "🚀 Publishing $NAME@$LOCAL_VER..."
                if ! (cd "$pkg_dir" && npm publish --provenance --access public); then
                  echo "❌ Publish FAILED for $NAME"
                  PUBLISH_FAILED=1
                fi
              else
                echo "⏭️ $NAME@$LOCAL_VER already on npm, skipping"
              fi
            else
              echo "::error::Release package manifest not found: $PKG_JSON"
              PUBLISH_FAILED=1
            fi
          done <<< "$RELEASE_DIRS"

          if [ "$PUBLISH_FAILED" -eq 1 ]; then
            echo "::error::One or more packages failed to publish"
            exit 1
          fi
