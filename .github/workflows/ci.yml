name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test packages/

      - name: Type check (core)
        run: bunx tsc --noEmit -p packages/core/tsconfig.json

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build workspace packages
        run: |
          for pkg_dir in packages/*/; do
            if [ -f "$pkg_dir/package.json" ]; then
              HAS_BUILD=$(node -p "var p=require('./$pkg_dir/package.json'); p.scripts && p.scripts.build ? 'yes' : 'no'")
              if [ "$HAS_BUILD" = "yes" ]; then
                echo "🔧 Building $(node -p "require('./$pkg_dir/package.json').name")"
                (cd "$pkg_dir" && bun run build)
              fi
            fi
          done

      - name: Install Playwright browsers
        run: bun run playwright install --with-deps chromium

      - name: Run E2E tests
        run: bun run playwright test
        # continue-on-error: true  -- removed: E2E must gate PRs

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build publishable packages
        run: |
          set -e
          for pkg_dir in packages/*/; do
            PKG_JSON="$pkg_dir/package.json"
            if [ -f "$PKG_JSON" ]; then
              HAS_BUILD=$(node -p "var p=require('./$PKG_JSON'); p.scripts && p.scripts.build ? 'yes' : 'no'")
              if [ "$HAS_BUILD" = "yes" ]; then
                PKG_NAME=$(node -p "require('./$PKG_JSON').name")
                echo "🔧 Building $PKG_NAME"
                (cd "$pkg_dir" && bun run build)
              fi
            fi
          done

      - name: Verify publish artifacts
        run: |
          set -e
          for pkg_dir in packages/*/; do
            PKG_JSON="$pkg_dir/package.json"
            if [ -f "$PKG_JSON" ]; then
              FILES=$(node -p "(require('./$PKG_JSON').files||[]).join(' ')" || true)
              if echo "$FILES" | grep -q "dist"; then
                if [ ! -d "$pkg_dir/dist" ] || [ -z "$(ls -A "$pkg_dir/dist" 2>/dev/null)" ]; then
                  echo "::error::Missing dist for $pkg_dir"
                  exit 1
                fi
              fi
            fi
          done

      - name: Publish changed packages
        run: |
          set -e
          PUBLISH_FAILED=0

          # Rewrite workspace:* to actual semver strings for npm publish
          cat > /tmp/rewrite-workspace.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const pkgs = fs.readdirSync('packages').filter(p => fs.statSync(path.join('packages', p)).isDirectory());
          const versions = {};
          for (const p of pkgs) {
            const pjson = path.join('packages', p, 'package.json');
            if (fs.existsSync(pjson)) {
              const data = JSON.parse(fs.readFileSync(pjson, 'utf8'));
              versions[data.name] = data.version;
            }
          }
          for (const p of pkgs) {
            const pjson = path.join('packages', p, 'package.json');
            if (!fs.existsSync(pjson)) continue;
            const raw = fs.readFileSync(pjson, 'utf8');
            const pkg = JSON.parse(raw);
            let changed = false;
            for (const t of ['dependencies', 'devDependencies', 'peerDependencies']) {
              if (pkg[t]) {
                for (const k in pkg[t]) {
                  if (pkg[t][k] === 'workspace:*' && versions[k]) {
                    pkg[t][k] = '^' + versions[k];
                    changed = true;
                  }
                }
              }
            }
            if (changed) {
              fs.writeFileSync(pjson, JSON.stringify(pkg, null, 2) + '\n');
              console.log('  Rewrote workspace:* in ' + pjson);
            }
          }
          EOF
          node /tmp/rewrite-workspace.js

          # With independent versioning, only packages whose version was bumped
          # by release-please will have a new version not yet on npm.
          for pkg_dir in packages/*/; do
            PKG_JSON="$pkg_dir/package.json"
            if [ -f "$PKG_JSON" ]; then
              NAME=$(node -p "require('./$PKG_JSON').name")
              LOCAL_VER=$(node -p "require('./$PKG_JSON').version")
              NPM_EXISTS=$(npm view "$NAME@$LOCAL_VER" version 2>/dev/null || echo "")

              if [ -z "$NPM_EXISTS" ]; then
                echo "🚀 Publishing $NAME@$LOCAL_VER..."
                if ! (cd "$pkg_dir" && npm publish --provenance --access public); then
                  echo "❌ Publish FAILED for $NAME"
                  PUBLISH_FAILED=1
                fi
              else
                echo "⏭️ $NAME@$LOCAL_VER already on npm, skipping"
              fi
            fi
          done

          if [ "$PUBLISH_FAILED" -eq 1 ]; then
            echo "::error::One or more packages failed to publish"
            exit 1
          fi
